<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tahmid Rahman</title>
    <style>
      html, body {
        height: 100%;
        margin: 0;
      }
      body {
        font-family: Arial, Helvetica, sans-serif;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: #1a1a1a;
      }
      .content {
        text-align: center;
        max-width: 480px;
        padding: 2rem 1.25rem;
      }
      h1 {
        margin: 0 0 0.5rem;
      }
      .subtitle {
        color: #666;
        margin: 0 0 2.5rem;
        font-size: 0.95rem;
      }
      .contact {
        color: #666;
        font-size: 0.9rem;
        margin: 2.5rem 0 0;
      }
      .contact a {
        color: #1a1a1a;
      }
      .blogs-section {
        text-align: left;
        width: 100%;
      }
      .blogs-label {
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #999;
        margin: 0 0 0.75rem;
      }
      .blog-link {
        display: block;
        padding: 0.75rem 1rem;
        border: 1px solid #e8e8e8;
        border-radius: 6px;
        text-decoration: none;
        color: #1a1a1a;
        font-size: 0.9rem;
        transition: border-color 0.15s;
      }
      .blog-link:hover {
        border-color: #aaa;
      }
      .blog-link__title {
        font-weight: 600;
        display: block;
        margin-bottom: 0.2rem;
      }
      .blog-link__desc {
        font-size: 0.8rem;
        color: #777;
      }
    </style>
  </head>
  <body>
    <div class="content">
      <h1>Hey!</h1>
      <p class="subtitle">
        You can reach me anytime at
        <a href="mailto:tahmid131@gmail.com">tahmid131@gmail.com</a>
      </p>

      <div class="blogs-section">
        <p class="blogs-label">Writing</p>
        <a class="blog-link" href="/blogs/list-virtualization-blog.html">
          <span class="blog-link__title">You're Rendering Too Much: The Case for List Virtualization</span>
          <span class="blog-link__desc">Your list works fine — until it has 10,000 items.</span>
        </a>
      </div>

      <p class="contact">This website is currently under maintenance</p>
    </div>
  </body>
</html>
